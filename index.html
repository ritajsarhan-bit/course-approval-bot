<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#f4f7f9;
    direction: rtl;
}

/* HEADER */

header{
    background:white;
    padding:40px 20px;
    text-align:center;
    border-bottom:5px solid #8b0029;
}

header img{
    width:90px;
    margin-bottom:15px;
}

header h1{
    color:#8b0029;
    font-size:56px;
    margin:10px 0;
}

header p{
    color:#222;
    font-size:24px;
}

/* MAIN CONTAINER */

.container{
    max-width:900px;
    margin:60px auto;
    background:white;
    padding:50px;
    border-radius:28px;
    box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

/* TITLES */

h2{
    color:#007b9e;
    font-size:42px;
    margin-bottom:25px;
}

/* SELECT */

select{
    width:100%;
    padding:20px;
    border-radius:16px;
    border:2px solid #cfd8dc;
    font-size:24px;
    margin-bottom:50px;
    background:white;
}

/* COURSE BOXES */

.course-box{
    background:#f8fbfc;
    border-right:8px solid #00a7a0;
    padding:30px;
    border-radius:22px;
    margin-bottom:25px;
    transition:0.3s;
    font-size:24px;
}

.course-box:hover{
    transform:scale(1.02);
    background:#eef8f8;
}

.course-box input{
    transform:scale(1.6);
    margin-left:18px;
}

/* BUTTON */

button{
    width:100%;
    padding:22px;
    background:#8b0029;
    color:white;
    border:none;
    border-radius:18px;
    font-size:28px;
    cursor:pointer;
    transition:0.3s;
    margin-top:35px;
}

button:hover{
    background:#006d87;
}

/* RESULT */

.result{
    margin-top:40px;
    padding:30px;
    border-radius:20px;
    background:#eef8f8;
    color:#004b5d;
    font-size:28px;
    text-align:center;
    display:none;
}

</style>
